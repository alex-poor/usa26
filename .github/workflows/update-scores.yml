name: Update Scores

on:
  schedule:
    # Runs every 2 hours — tweak during busy match days
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Fetch results and recalculate scores
        run: node scripts/update-scores.js
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/matches.json public/data/scores.json
          git diff --staged --quiet || git commit -m "chore: update scores $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
